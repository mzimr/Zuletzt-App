<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Zuletzt</title> <meta name="theme-color" content="#ffffff"> <link rel="manifest" href="manifest.json"> <link rel="stylesheet" href="styles.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"> </head> <body> <div class="app"> <header> <div> <h1>Zuletzt</h1> <p>Heute wichtig</p> </div> <button id="darkModeButton"> 🌙 </button> </header> <section class="dashboard"> <div class="card big"> <h2>Heute</h2> <p id="todayCount"> 0 Aufgaben </p> </div> <div class="card"> <h2>Erledigt</h2> <p id="doneCount"> 0 </p> </div> <div class="card"> <h2>Offen</h2> <p id="openCount"> 0 </p> </div> </section> <section class="newTask"> <input id="taskInput" placeholder="Neue Aufgabe"> <select id="category"> <option value="Privat">🏠 Privat</option> <option value="Arbeit">💼 Arbeit</option> <option value="Einkaufen">🛒 Einkaufen</option> <option value="Gesundheit">❤️ Gesundheit</option> <option value="Sonstiges">📦 Sonstiges</option> </select> <select id="priority"> <option value="1">⭐ Niedrig</option> <option value="2">⭐⭐ Mittel</option> <option value="3">⭐⭐⭐ Hoch</option> </select> <input type="date" id="dueDate"> <button id="addButton"> + </button> </section> <section class="searchBar"> <input id="search" placeholder="🔍 Suche"> </section> <section> <ul id="taskList"> </ul> </section> </div> <script src="app.js"></script> </body> </html>
